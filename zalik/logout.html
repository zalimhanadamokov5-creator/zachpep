<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заявки | Python Факультатив</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrapper">
    <header class="site-header">
        <div class="logo"><div class="logo-img"><i class="fab fa-python"></i></div><div><span>PythonПособие</span><small>МКОУ «СОШ №25» г.о.</small></div></div>
        <div class="header-info" id="headerAuthBlock"></div>
    </header>
    <div class="main-container">
        <aside class="sidebar"><nav class="vertical-menu" id="sidebarMenu"></nav></aside>
        <main class="content" id="dynamicContent"></main>
    </div>
    <footer class="site-footer"><p>© 2025 Python Пособие | МКОУ «СОШ №25»</p></footer>
</div>
<script src="js/main.js"></script>
<script>
    updateHeaderAndMenu();
    if (!requireAuth()) {}
    function renderMyApps() {
        const container = document.getElementById('dynamicContent');
        const userApps = getUserApps(currentUserId);
        if(userApps.length===0){
            container.innerHTML=`<div class="card"><h1>Мои заявки</h1><div class="alert info">Вы ещё не подавали заявку. <button class="btn-primary" id="createFirstBtn">Создать заявку</button></div></div>`;
            document.getElementById('createFirstBtn')?.addEventListener('click',()=>{ window.location.href='create_app.html'; });
            return;
        }
        let rows='';
        userApps.forEach(a=>{
            let statusClass = '';
            if(a.status === 'новая') statusClass = 'status-новая';
            else if(a.status === 'принята') statusClass = 'status-принята';
            else if(a.status === 'отклонена') statusClass = 'status-отклонена';
            rows+=`<tr><td>${a.id}</td><td>${escapeHtml(a.address)}</td><td>${escapeHtml(a.contactPhone)}</td><td>${a.desiredDate}</td><td>${a.desiredTime}</td><td>${escapeHtml(a.serviceType)}</td><td>${a.deliveryType}</td><td><span class="status-badge ${statusClass}">${a.status}</span></td><td>${new Date(a.createdAt).toLocaleString()}</td></tr>`;
        });
        container.innerHTML=`
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><h1>📋 Мои заявки</h1><button class="btn-primary" id="newAppBtn"><i class="fas fa-plus"></i> Новая заявка</button></div>
            <div class="requests-list" style="overflow-x:auto;"><table class="requests-table"><thead><tr><th>ID</th><th>Адрес</th><th>Телефон</th><th>Дата</th><th>Время</th><th>Модуль</th><th>Способ</th><th>Статус</th><th>Дата заявки</th></tr></thead><tbody>${rows}</tbody></table></div>
        `;
        document.getElementById('newAppBtn')?.addEventListener('click',()=>{ window.location.href='create_app.html'; });
    }
    renderMyApps();
</script>
</body>
</html>
